<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Add Transaction</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </head>
    <body>
        <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-wallet"></i>Finance Tracker
        </div>

        <ul>
            <li>
                <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i>Dashboard</a>
            </li>

            <li class="active">
                <a href="add-transaction.html"><i class="fa-solid fa-plus"></i>Add Transaction</a>
            </li>

            <li>
                <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i>History</a>
            </li>

            <li>
                <a href="reports.html"><i class="fa-solid fa-chart-line"></i>Reports</a>
            </li>

            <li>
                <a href="assistant.html"><i class="fa-solid fa-robot"></i>AI Assistant</a>
            </li>

            <li>
                <a href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a>
            </li>
        </ul>
</div>

<div class="main">

    <h1>Add Transaction</h1>

    <p style="margin-top:10px; margin-bottom:30px;">
        Record your income and expenses.
    </p>

    <div class="card">

        <form id="transactionForm">

            <label>Description</label>

            <input
                type="text"
                id="description"
                placeholder="e.g. Grocery Shopping"
                required>

            <label>Amount</label>

            <input
                type="number"
                id="amount"
                placeholder="Enter Amount"
                min="1"
                required>

            <label>Type</label>

            <select id="type">

                <option value="expense">Expense</option>

                <option value="income">Income</option>

            </select>

            <label>Category</label>

            <select id="category">

                <option>Food</option>
                <option>Shopping</option>
                <option>Travel</option>
                <option>Transport</option>
                <option>Entertainment</option>
                <option>Education</option>
                <option>Healthcare</option>
                <option>Bills</option>
                <option>Salary</option>
                <option>Investment</option>
                <option>Other</option>

            </select>

            <label>Date</label>

            <input
                type="date"
                id="date"
                required>

            <button class="btn" style="width:100%;">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Transaction

            </button>

        </form>

    </div>

</div>

<script src="js/storage.js"></script>

<script>

const settings = getSettings();

if(settings.darkMode){
    document.body.classList.add("dark");
}

document.getElementById("date").value = new Date().toISOString().split("T")[0];

document.getElementById("transactionForm").addEventListener("submit",function(e){

    e.preventDefault();
    addTransaction({

        description:
        document.getElementById("description").value,

        amount:
        Number(document.getElementById("amount").value),

        type:
        document.getElementById("type").value,

        category:
        document.getElementById("category").value,

        date:
        document.getElementById("date").value

    });

    alert("Transaction Added Successfully!");

    window.location.href="add-transaction.html";

});

</script>

</body>

</html>
