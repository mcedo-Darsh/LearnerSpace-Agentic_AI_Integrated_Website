<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-wallet"></i>

        Finance Tracker

    </div>

    <ul>

        <li>
            <a href="dashboard.html">
                <i class="fa-solid fa-chart-pie"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="add-transaction.html">
                <i class="fa-solid fa-plus"></i>
                Add Transaction
            </a>
        </li>

        <li>
            <a href="history.html">
                <i class="fa-solid fa-clock-rotate-left"></i>
                History
            </a>
        </li>

        <li>
            <a href="reports.html">
                <i class="fa-solid fa-chart-line"></i>
                Reports
            </a>
        </li>

        <li>
            <a href="assistant.html">
                <i class="fa-solid fa-robot"></i>
                AI Assistant
            </a>
        </li>

        <li class="active">
            <a href="settings.html">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>
        </li>

    </ul>

</div>

<div class="main">

    <h1>Settings</h1>

    <p style="margin-top:10px;margin-bottom:35px;">
        Customize your Finance Tracker experience.
    </p>

    <div class="card">

        <label>Monthly Budget</label>

        <input
        type="number"
        id="budget"
        placeholder="Enter your monthly budget">

        <label>Currency</label>

        <select id="currency">

            <option value="₹">₹ Indian Rupee</option>

            <option value="$">$ US Dollar</option>

            <option value="€">€ Euro</option>

            <option value="£">£ Pound</option>

        </select>

        <label
        style="display:flex;
        align-items:center;
        gap:12px;
        margin:20px 0;">

            <input
            type="checkbox"
            id="darkMode"
            style="width:auto;">

            Enable Dark Mode

        </label>

        <button
        class="btn"
        id="saveBtn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Settings

        </button>

    </div>

    <br>

    <div class="card">

        <h3 style="color:#DC2626;">
            Delete
        </h3>

        <p style="margin:15px 0;">
            This will permanently delete all your saved transactions.
        </p>

        <button
        class="btn"
        id="resetBtn"
        style="background:#DC2626;">

            <i class="fa-solid fa-trash"></i>

            Reset Transactions

        </button>

    </div>

</div>

<script src="js/storage.js"></script>

<script>

const settings = getSettings();

document.getElementById("budget").value =
settings.budget;

document.getElementById("currency").value =
settings.currency;

document.getElementById("darkMode").checked =
settings.darkMode;

if(settings.darkMode){

    document.body.classList.add("dark");

}

document.getElementById("saveBtn")
.addEventListener("click",()=>{

    const newSettings={

        budget:Number(document.getElementById("budget").value),

        currency:document.getElementById("currency").value,

        darkMode:document.getElementById("darkMode").checked

    };

    saveSettings(newSettings);

    if(newSettings.darkMode){

        document.body.classList.add("dark");

    }

    else{

        document.body.classList.remove("dark");

    }

    alert("Settings Saved Successfully!");

});

document.getElementById("resetBtn")
.addEventListener("click",()=>{

    if(confirm("Delete all transactions?")){

        clearTransactions();

        alert("All Transactions Deleted!");

    }

});

</script>

</body>

</html>
