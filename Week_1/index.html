<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="loginbox">
            <h2>Login Page</h2>
            <p>Welcome to the Website. Log in below</p>
            <form>
                <input class="formelement" type="text" placeholder="Mobile number, username or email" name="username" id="username" required>
                <br>
                <input class="formelement" type="password" placeholder="Password" name="password" id="password" required>
                <br>
                <button class="formelement" type="submit" id="loginbutton">Login</button>
            </form>
        </div>
    </body>
</html>
